<div class="modal-flat-container">
  <h2 class="form-title">Adicionar novo usuário</h2>

  <form [formGroup]="userForm" class="flat-form">
    
    <div class="input-underline">
      <input type="email" placeholder="Usuário (e-mail) *" formControlName="email">
    </div>

    <div class="input-underline">
      <input type="text" placeholder="Nome completo *" formControlName="name">
    </div>

    <div class="form-row-triple">
      <div class="input-underline flex-2">
        <input type="text" placeholder="CPF *" formControlName="cpf">
      </div>

      <div class="input-underline flex-2">
        <input type="text" placeholder="Número do telefone *" formControlName="phone">
      </div>

      <div class="input-underline flex-1 select-wrapper">
        <select formControlName="phoneType">
          <option value="CELULAR">CELULAR</option>
          <option value="FIXO">FIXO</option>
        </select>
        <span class="arrow">▼</span>
      </div>
    </div>

    <p class="sms-info">
      O usuário receberá uma senha provisória para acesso ao sistema por SMS.
    </p>

    <div class="actions-left">
      <button mat-raised-button color="primary" class="btn-salvar" (click)="onSave()" [disabled]="userForm.invalid">
        SALVAR
      </button>
    </div>
  </form>
</div>

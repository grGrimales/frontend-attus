<div class="content-wrapper">
  <div class="container-center">
    <p class="subtitle">Usuários cadastrados</p>

    <table mat-table [dataSource]="users()" class="user-table">
      
      <ng-container matColumnDef="name">
        <td mat-cell *matCellDef="let user">
          <div class="name-cell">
            <mat-icon class="user-icon">person</mat-icon>
            <span class="user-name">{{ user.name }}</span>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="email">
        <td mat-cell *matCellDef="let user" class="email-text">
          {{ user.email }}
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <td mat-cell *matCellDef="let user" class="action-cell">
          <button mat-icon-button (click)="editUser(user)">
            <mat-icon class="edit-icon">edit</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="user-row card-effect"></tr>
    </table>
  </div>
</div>

<button mat-fab class="fab-bottom-right" (click)="addUser()">
  <mat-icon>add</mat-icon>
</button>

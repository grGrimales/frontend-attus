<div class="confirm-container">
  <h2 class="confirm-title">Excluir usuário</h2>
  <div class="confirm-content">
    <p>Você tem certeza que deseja excluir este usuário? Esta ação não pode ser desfeita.</p>
  </div>
  <div class="confirm-actions">
    <button mat-flat-button color="warn" (click)="onConfirm()" class="btn-delete">EXCLUIR</button>
    <button mat-button (click)="onCancel()" class="btn-cancel">CANCELAR</button>
  </div>
</div>
